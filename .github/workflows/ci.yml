name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel in-progress runs for the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26.4'

jobs:
  # Quick lint check (runs first, fails fast)
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # Build and test across multiple OS (conditional matrix)
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        # PR: Ubuntu only for speed, Push: all platforms
        os: ${{ github.event_name == 'pull_request' && fromJSON('["ubuntu-latest"]') || fromJSON('["ubuntu-latest", "macos-latest", "windows-latest"]') }}
        go-version: ['1.26.4']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
            ~/Library/Caches/go-build
            ~\AppData\Local\go-build
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ matrix.go-version }}-

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage (Ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
          fail_ci_if_error: false

  # Verify compilation for all packages
  compile-check:
    name: Compile Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Verify all packages compile
        run: |
          go build ./...
          go vet ./...

  # Security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Run Gosec
        uses: securego/gosec@master
        with:
          args: -exclude-generated ./...

  # Vulnerability scanning (stdlib + deps CVEs)
  vulncheck:
    name: Vulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.4'
      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  # Bootstrap init script on Ubuntu + macOS (BSD/GNU sed)
  bootstrap-init:
    name: Bootstrap Init (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Run init-project.sh
        run: |
          set -euo pipefail
          bash scripts/init-project.sh mytool
          test -d cmd/mytool
          grep -q 'module github.com/gizzahub/gzh-cli-mytool' go.mod
          ! grep -r '__PROJECT_NAME__' --include='*.go' --include='*.md' --include='Makefile' --include='*.yml' . || true
          # placeholder may remain only inside init-project.sh itself
          leftover=$(grep -r '__PROJECT_NAME__' --include='*.go' --include='*.md' --include='Makefile' --include='*.yml' --include='*.yaml' --include='*.mod' . | grep -v scripts/init-project.sh || true)
          if [ -n "$leftover" ]; then
            echo "leftover placeholders: $leftover"
            exit 1
          fi

